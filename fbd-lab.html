            1: {
                title: "กฎความเฉื่อย (Inertia)",
                desc: "วัตถุจะรักษาสภาพอยู่นิ่ง หรือเคลื่อนที่ด้วยความเร็วคงที่ในทิศทางเดิม หากไม่มีแรงลัพธ์มากระทำ (ΣF = 0)",
                q: "จำลองรถที่กำลังวิ่งแล้วเบรกกะทันหัน ทำไมกล่องบนหลังคารถถึงไถลไปข้างหน้า?",
                a: "เพราะแรงเบรกกระทำที่รถ (รถหยุด) แต่ไม่มีแรงต้านกระทำที่กล่อง กล่องจึงพยายามรักษาสภาพการเคลื่อนที่เดิมด้วยความเร็วเท่าเดิมตามกฎข้อ 1"
            },
            2: {
                title: "กฎของความเร่ง (F = ma)",
                desc: "เมื่อมีแรงลัพธ์ที่ไม่เป็นศูนย์มากระทำต่อวัตถุ จะทำให้วัตถุมีความเร่ง โดยความเร่งจะแปรผันตรงกับแรง และแปรผกผันกับมวล",
                q: "หากเราออกแรง 500 N ผลักกล่อง 10 kg (สีน้ำเงิน) และกล่อง 50 kg (สีแดง) กล่องใดจะวิ่งถึงเส้นชัยก่อน?",
                a: "กล่องสีน้ำเงิน (10 kg) เพราะมีมวลน้อยกว่า เมื่อถูกกระทำด้วยแรงที่เท่ากัน จึงมีความเร่งมากกว่า (a = F/m) ทำให้เคลื่อนที่ได้เร็วกว่า"
            },
            3: {
                title: "กริยา = ปฏิกิริยา (Action = Reaction)",
                desc: "ทุกแรงกริยา ย่อมมีแรงปฏิกิริยาที่มีขนาดเท่ากันแต่ทิศทางตรงกันข้ามเสมอ (F₁₂ = -F₂₁)",
                q: "นักสเก็ต A มวล 80kg ผลัก นักสเก็ต B มวล 40kg แรงที่ทั้งสองได้รับเท่ากันหรือไม่? และใครจะถอยหลังเร็วกว่า?",
                a: "ทั้งคู่ได้รับ 'แรง' เท่ากันเป๊ะ! (ตามกฎข้อ 3) แต่ B จะถอยหลังเร็วกว่า เพราะ B มีมวลน้อยกว่าจึงมีความเร่งมากกว่า (ตามกฎข้อ 2)"
            }
        };

        function resizeNewton() {
            if (!getNewtonCtx()) return;
            const rect = nCanvas.parentElement.getBoundingClientRect();
            nCanvas.width = rect.width; nCanvas.height = rect.height;
            drawNewton();
        }

        function initNewton(lawIdx) {
            nlState.law = lawIdx;
            
            [1, 2, 3].forEach(i => {
                const tab = document.getElementById(`tab-law-${i}`);
                if (!tab) return;
                if (i === lawIdx) {
                    tab.className = "flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow text-emerald-700";
                } else {
                    tab.className = "flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500 hover:text-slate-700";
                }
            });

            const d = lawData[lawIdx];
            document.getElementById('newton-content').innerHTML = `
                <div class="bg-emerald-50 text-emerald-800 p-3 rounded-xl border border-emerald-100 text-sm mb-2 shadow-sm">
                    <span class="font-bold block mb-1">${d.title}</span>
                    ${d.desc}
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative mt-2 flex-1 flex flex-col">
                    <div class="absolute -top-3 left-4 bg-orange-100 text-orange-700 px-2 py-0.5 text-[10px] font-bold rounded-full border border-orange-200">คำถามชวนคิด <i class="fas fa-lightbulb"></i></div>
                    <p class="text-sm font-semibold text-slate-700 mt-2">${d.q}</p>
                    <div class="mt-auto pt-4">
                        <button onclick="toggleNewtonAns()" id="btn-show-ans" class="w-full py-2 bg-slate-800 text-white text-xs font-bold rounded-lg hover:bg-slate-700 transition">ดูคำอธิบาย / เฉลย</button>
                        <div id="newton-ans" class="hidden mt-3 p-3 bg-blue-50 text-blue-800 text-sm rounded-lg border border-blue-100 border-l-4 border-l-blue-500">
                            ${d.a}
                        </div>
                    </div>
                </div>
            `;
            
            resetNewton();
        }

        function toggleNewtonAns() {
            const ans = document.getElementById('newton-ans');
            const btn = document.getElementById('btn-show-ans');
            if (ans.classList.contains('hidden')) {
                ans.classList.remove('hidden');
                btn.innerText = "ซ่อนคำอธิบาย";
                btn.classList.replace('bg-slate-800', 'bg-slate-300');
                btn.classList.replace('text-white', 'text-slate-700');
            } else {
                ans.classList.add('hidden');
                btn.innerText = "ดูคำอธิบาย / เฉลย";
                btn.classList.replace('bg-slate-300', 'bg-slate-800');
                btn.classList.replace('text-slate-700', 'text-white');
            }
        }

        function resetNewton() {
            if (newtonAnimFrame) cancelAnimationFrame(newtonAnimFrame);
            nlState.status = 'idle';
            nlState.t = 0;
            
            nlState.carX = 50; nlState.carV = 200; nlState.boxX = 50; nlState.boxV = 200;
            nlState.m1X = 50; nlState.m1V = 0; nlState.m2X = 50; nlState.m2V = 0;
            nlState.skaterA.x = -30; nlState.skaterA.v = 0; 
            nlState.skaterB.x = 30; nlState.skaterB.v = 0;

            const btn = document.getElementById('btn-play-newton');
            if (btn) {
                btn.innerHTML = '<i class="fas fa-play"></i> จำลอง';
                btn.className = "px-6 py-2 text-sm bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold rounded-full shadow-lg w-32 hover:shadow-emerald-500/50";
            }
            drawNewton();
        }

        function playNewton() {
            if (nlState.status === 'idle') {
                nlState.status = 'playing';
                nlState.lastTime = performance.now();
                
                const btn = document.getElementById('btn-play-newton');
                if (nlState.law === 1) {
                    btn.innerHTML = '<i class="fas fa-hand-paper"></i> เบรก!';
                    btn.className = "px-6 py-2 text-sm bg-gradient-to-r from-red-500 to-rose-500 text-white font-bold rounded-full shadow-lg w-32 animate-pulse";
                } else {
                    btn.innerHTML = '<i class="fas fa-running"></i> กำลังทำงาน...';
                    btn.className = "px-6 py-2 text-sm bg-slate-400 text-white font-bold rounded-full shadow-lg w-32 cursor-not-allowed";
                }
                
                simLoopNewton();
            } else if (nlState.status === 'playing' && nlState.law === 1) {
                nlState.status = 'braking';
                const btn = document.getElementById('btn-play-newton');
                btn.innerHTML = 'หยุดแล้ว';
                btn.className = "px-6 py-2 text-sm bg-slate-400 text-white font-bold rounded-full shadow-lg w-32 cursor-not-allowed";
            }
        }

        function simLoopNewton() {
            if (nlState.status === 'idle' || !getNewtonCtx()) return;
            
            const now = performance.now();
            const dt = Math.min((now - nlState.lastTime) / 1000, 0.1);
            nlState.lastTime = now;
            nlState.t += dt;

            if (nlState.law === 1) {
                if (nlState.status === 'playing') {
                    nlState.carX += nlState.carV * dt;
                    nlState.boxX += nlState.boxV * dt;
                } else if (nlState.status === 'braking') {
                    nlState.carV -= 800 * dt; 
                    if (nlState.carV < 0) nlState.carV = 0;
                    nlState.carX += nlState.carV * dt;
                    nlState.boxX += nlState.boxV * dt;
                }
                if (nlState.boxX > nCanvas.width + 100) nlState.status = 'end'; 
            } 
            else if (nlState.law === 2) {
                if (nlState.m1X < nCanvas.width - 150) { nlState.m1V += nlState.m1A * dt; nlState.m1X += nlState.m1V * dt; }
                if (nlState.m2X < nCanvas.width - 150) { nlState.m2V += nlState.m2A * dt; nlState.m2X += nlState.m2V * dt; }
                
                if (nlState.m1X >= nCanvas.width - 150 && nlState.m2X >= nCanvas.width - 150) nlState.status = 'end';
            }
            else if (nlState.law === 3) {
                if (nlState.t > 0.5) {
                    nlState.skaterA.v = -100; 
                    nlState.skaterB.v = 200;  
                    nlState.skaterA.x += nlState.skaterA.v * dt;
                    nlState.skaterB.x += nlState.skaterB.v * dt;
                }
                if (nlState.skaterB.x > nCanvas.width/2 + 100) nlState.status = 'end';
            }

            drawNewton();
            
            if (nlState.status !== 'end') {
                newtonAnimFrame = requestAnimationFrame(simLoopNewton);
            }
        }

        function drawNewton() {
            let activeCtx = getNewtonCtx();
            if (!activeCtx || !nCanvas) return;

            activeCtx.clearRect(0, 0, nCanvas.width, nCanvas.height);
            
            const floorY = nCanvas.height * 0.75;
            activeCtx.fillStyle = '#e2e8f0'; activeCtx.fillRect(0, floorY, nCanvas.width, nCanvas.height - floorY);
            activeCtx.strokeStyle = '#cbd5e1'; activeCtx.lineWidth = 2; activeCtx.beginPath(); activeCtx.moveTo(0, floorY); activeCtx.lineTo(nCanvas.width, floorY); activeCtx.stroke();

            if (nlState.law === 1) {
                const cx = nlState.carX, cy = floorY;
                const bx = nlState.boxX;
                
                activeCtx.fillStyle = '#3b82f6'; activeCtx.fillRect(cx - 60, cy - 40, 120, 30); 
                activeCtx.fillRect(cx - 30, cy - 70, 60, 30); 
                activeCtx.fillStyle = '#1e293b'; 
                activeCtx.beginPath(); activeCtx.arc(cx - 35, cy - 10, 12, 0, Math.PI*2); activeCtx.fill(); 
                activeCtx.beginPath(); activeCtx.arc(cx + 35, cy - 10, 12, 0, Math.PI*2); activeCtx.fill(); 

                let dropY = 0;
                if (bx > cx + 60) {
                    dropY = Math.min((bx - (cx + 60)), floorY - (cy - 70) - 15);
                }
                activeCtx.fillStyle = '#d97706'; activeCtx.fillRect(bx - 15, cy - 70 - 30 + dropY, 30, 30);
                activeCtx.strokeStyle = '#92400e'; activeCtx.strokeRect(bx - 15, cy - 70 - 30 + dropY, 30, 30);

                if (nlState.carV > 0) {
                    activeCtx.strokeStyle = '#94a3b8'; activeCtx.beginPath();
                    activeCtx.moveTo(cx - 80, cy - 25); activeCtx.lineTo(cx - 110, cy - 25);
                    activeCtx.moveTo(cx - 70, cy - 50); activeCtx.lineTo(cx - 90, cy - 50);
                    activeCtx.stroke();
                }

                if (nlState.status === 'braking' && nlState.carV > 0) {
                    activeCtx.fillStyle = 'rgba(239, 68, 68, 0.8)';
                    activeCtx.font = "bold 16px Prompt"; activeCtx.fillText("F (แรงเบรก)", cx, cy + 30);
                    activeCtx.strokeStyle = 'red'; activeCtx.lineWidth = 3;
                    activeCtx.beginPath(); activeCtx.moveTo(cx, cy + 15); activeCtx.lineTo(cx - 40, cy + 15); activeCtx.stroke();
                    activeCtx.beginPath(); activeCtx.moveTo(cx - 40, cy + 15); activeCtx.lineTo(cx - 30, cy + 10); activeCtx.lineTo(cx - 30, cy + 20); activeCtx.fill();
                }

            } 
            else if (nlState.law === 2) {
                const finishX = nCanvas.width - 100;
                activeCtx.strokeStyle = '#ef4444'; activeCtx.lineWidth = 4; activeCtx.setLineDash([10, 10]);
                activeCtx.beginPath(); activeCtx.moveTo(finishX, floorY); activeCtx.lineTo(finishX, floorY - 200); activeCtx.stroke(); activeCtx.setLineDash([]);
                activeCtx.fillStyle = '#ef4444'; activeCtx.font = "bold 16px Prompt"; activeCtx.fillText("เส้นชัย", finishX, floorY - 210);

                const y1 = floorY - 120;
                activeCtx.fillStyle = '#3b82f6'; activeCtx.fillRect(nlState.m1X - 20, y1 - 40, 40, 40);
                activeCtx.fillStyle = '#fff'; activeCtx.font = "bold 14px Prompt"; activeCtx.textAlign = "center"; activeCtx.fillText("10kg", nlState.m1X, y1 - 20);
                
                const y2 = floorY;
                activeCtx.fillStyle = '#dc2626'; activeCtx.fillRect(nlState.m2X - 35, y2 - 70, 70, 70);
                activeCtx.fillStyle = '#fff'; activeCtx.font = "bold 16px Prompt"; activeCtx.textAlign = "center"; activeCtx.fillText("50kg", nlState.m2X, y2 - 35);

                if (nlState.status !== 'idle') {
                    activeCtx.fillStyle = '#10b981'; activeCtx.strokeStyle = '#10b981'; activeCtx.lineWidth = 3;
                    if (nlState.m1X < finishX) {
                        activeCtx.beginPath(); activeCtx.moveTo(nlState.m1X - 50, y1 - 20); activeCtx.lineTo(nlState.m1X - 25, y1 - 20); activeCtx.stroke();
                        activeCtx.beginPath(); activeCtx.moveTo(nlState.m1X - 25, y1 - 20); activeCtx.lineTo(nlState.m1X - 35, y1 - 25); activeCtx.lineTo(nlState.m1X - 35, y1 - 15); activeCtx.fill();
                        activeCtx.fillText("F", nlState.m1X - 60, y1 - 20);
                    }
                    if (nlState.m2X < finishX) {
                        activeCtx.beginPath(); activeCtx.moveTo(nlState.m2X - 65, y2 - 35); activeCtx.lineTo(nlState.m2X - 40, y2 - 35); activeCtx.stroke();
                        activeCtx.beginPath(); activeCtx.moveTo(nlState.m2X - 40, y2 - 35); activeCtx.lineTo(nlState.m2X - 50, y2 - 40); activeCtx.lineTo(nlState.m2X - 50, y2 - 30); activeCtx.fill();
                        activeCtx.fillText("F", nlState.m2X - 75, y2 - 35);
                    }
                }

            }
            else if (nlState.law === 3) {
                const cx = nCanvas.width / 2;
                const ax = cx + nlState.skaterA.x;
                const bx = cx + nlState.skaterB.x;

                activeCtx.fillStyle = '#3b82f6'; 
                activeCtx.beginPath(); activeCtx.arc(ax - 20, floorY - 60, 25, 0, Math.PI*2); activeCtx.fill(); 
                activeCtx.beginPath(); activeCtx.arc(ax - 20, floorY - 100, 15, 0, Math.PI*2); activeCtx.fill(); 
                activeCtx.fillStyle = '#fff'; activeCtx.font = "bold 12px Prompt"; activeCtx.fillText("A (80kg)", ax - 20, floorY - 60);

                activeCtx.fillStyle = '#ef4444'; 
                activeCtx.beginPath(); activeCtx.arc(bx + 20, floorY - 45, 18, 0, Math.PI*2); activeCtx.fill(); 
                activeCtx.beginPath(); activeCtx.arc(bx + 20, floorY - 75, 12, 0, Math.PI*2); activeCtx.fill(); 
                activeCtx.fillStyle = '#fff'; activeCtx.font = "bold 10px Prompt"; activeCtx.fillText("B (40kg)", bx + 20, floorY - 45);

                if (nlState.status === 'idle' || nlState.t < 0.5) {
                    activeCtx.strokeStyle = '#334155'; activeCtx.lineWidth = 4;
                    activeCtx.beginPath(); activeCtx.moveTo(ax, floorY - 60); activeCtx.lineTo(cx, floorY - 60); activeCtx.stroke(); 
                    activeCtx.beginPath(); activeCtx.moveTo(bx, floorY - 45); activeCtx.lineTo(cx, floorY - 45); activeCtx.stroke(); 
                    
                    if (nlState.status !== 'idle') {
                        activeCtx.lineWidth = 3;
                        
                        activeCtx.strokeStyle = '#3b82f6'; activeCtx.fillStyle = '#3b82f6';
                        activeCtx.beginPath(); activeCtx.moveTo(cx, floorY - 110); activeCtx.lineTo(cx - 40, floorY - 110); activeCtx.stroke();
                        activeCtx.beginPath(); activeCtx.moveTo(cx - 40, floorY - 110); activeCtx.lineTo(cx - 30, floorY - 115); activeCtx.lineTo(cx - 30, floorY - 105); activeCtx.fill();
                        activeCtx.fillText("F (ปฏิกิริยา)", cx - 60, floorY - 125);
                        
                        activeCtx.strokeStyle = '#ef4444'; activeCtx.fillStyle = '#ef4444';
                        activeCtx.beginPath(); activeCtx.moveTo(cx, floorY - 110); activeCtx.lineTo(cx + 40, floorY - 110); activeCtx.stroke();
                        activeCtx.beginPath(); activeCtx.moveTo(cx + 40, floorY - 110); activeCtx.lineTo(cx + 30, floorY - 115); activeCtx.lineTo(cx + 30, floorY - 105); activeCtx.fill();
                        activeCtx.fillText("F (กริยา)", cx + 60, floorY - 125);
                    }
                } else {
                    activeCtx.strokeStyle = '#334155'; activeCtx.lineWidth = 4;
                    activeCtx.beginPath(); activeCtx.moveTo(ax, floorY - 60); activeCtx.lineTo(ax - 10, floorY - 50); activeCtx.stroke();
                    activeCtx.beginPath(); activeCtx.moveTo(bx, floorY - 45); activeCtx.lineTo(bx + 10, floorY - 35); activeCtx.stroke();
                    
                    activeCtx.lineWidth = 2;
                    activeCtx.strokeStyle = '#3b82f6'; activeCtx.fillStyle = '#3b82f6';
                    activeCtx.beginPath(); activeCtx.moveTo(ax - 20, floorY - 130); activeCtx.lineTo(ax - 50, floorY - 130); activeCtx.stroke();
                    activeCtx.beginPath(); activeCtx.moveTo(ax - 50, floorY - 130); activeCtx.lineTo(ax - 40, floorY - 135); activeCtx.lineTo(ax - 40, floorY - 125); activeCtx.fill();
                    activeCtx.fillText("v", ax - 60, floorY - 130);

                    activeCtx.strokeStyle = '#ef4444'; activeCtx.fillStyle = '#ef4444';
                    activeCtx.beginPath(); activeCtx.moveTo(bx + 20, floorY - 130); activeCtx.lineTo(bx + 80, floorY - 130); activeCtx.stroke(); 
                    activeCtx.beginPath(); activeCtx.moveTo(bx + 80, floorY - 130); activeCtx.lineTo(bx + 70, floorY - 135); activeCtx.lineTo(bx + 70, floorY - 125); activeCtx.fill();
                    activeCtx.fillText("v (เร็วกว่า)", bx + 100, floorY - 130);
                }
            }
        }

        window.addEventListener('load', () => {
            // ล้างค่าแล้วรันเริ่มต้นเมื่อโครงสร้าง HTML โหลดเสร็จเท่านั้น
            setScenario(state.scenario);
            navTo('sim');   // เปิดเข้าห้องจำลองอิสระทันที (ใช้เป็นโหมด FBD Lab ของ PhysiQuest)
            resize();
        });
    </script>
