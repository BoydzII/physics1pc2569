<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photon's Journey - Physics Simulator & Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f9ff; overflow: hidden; }
        h1, h2, h3, h4, .heading-font { font-family: 'Mitr', sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .view-section { display: none; width: 100%; height: 100%; animation: fadeIn 0.3s ease; }
        .view-section.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; cursor: pointer; margin-top: -6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #e2e8f0; border-radius: 9999px; }
        input[type=range]:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .slider-red::-webkit-slider-thumb { background: #ef4444; } .slider-blue::-webkit-slider-thumb { background: #3b82f6; } 
        .slider-green::-webkit-slider-thumb { background: #10b981; } .slider-orange::-webkit-slider-thumb { background: #f97316; } 
        .slider-purple::-webkit-slider-thumb { background: #8b5cf6; } .slider-teal::-webkit-slider-thumb { background: #14b8a6; }

        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .home-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .home-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        .math-modal { transition: all 0.3s; opacity: 0; pointer-events: none; }
        .math-modal.show { opacity: 1; pointer-events: auto; z-index: 100; }
        
        .eq-grid { display: grid; grid-template-columns: max-content max-content 1fr; gap: 0.25rem 0.75rem; align-items: center; font-family: monospace; font-size: 1rem; color: #334155; }
        .eq-grid > :nth-child(3n+1) { text-align: right; }
        .eq-grid > :nth-child(3n+2) { text-align: center; color: #ef4444; font-weight: bold; }
        .eq-grid > :nth-child(3n) { text-align: left; }
    </style>
</head>
<body class="w-screen h-screen">

    <!-- ================= 1. HOME VIEW ================= -->
    <div id="view-home" class="view-section active flex-col items-center justify-center p-6 bg-gradient-to-br from-blue-50 to-indigo-100">
        <h1 class="text-4xl md:text-5xl font-bold text-indigo-900 mb-2 heading-font text-center">Photon's Journey</h1>
        <p class="text-slate-600 mb-10 text-center text-lg">ศูนย์รวมการเรียนรู้กฎการเคลื่อนที่ของนิวตันและสมดุลกล</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl justify-center">
            <!-- Simulation Card -->
            <button onclick="navTo('sim')" class="home-card flex-1 bg-white rounded-3xl p-8 border-2 border-transparent hover:border-blue-200 text-left relative overflow-hidden group z-10">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-100 rounded-bl-full -z-10 group-hover:scale-110 transition-transform"></div>
                <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-blue-600 text-white rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-lg"><i class="fas fa-shapes"></i></div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2 heading-font">ห้องจำลองอิสระ</h2>
                <p class="text-slate-500 mb-4">สังเกตพฤติกรรมของแรง การเคลื่อนที่ และสมดุลกล พร้อมดูวิธีทำสมการแบบละเอียด</p>
                <span class="text-blue-600 font-semibold flex items-center gap-2 group-hover:translate-x-2 transition-transform">เข้าสู่ห้องทดลอง <i class="fas fa-arrow-right"></i></span>
            </button>

            <!-- Newton's Laws Card -->
            <button onclick="navTo('newton')" class="home-card flex-1 bg-white rounded-3xl p-8 border-2 border-transparent hover:border-emerald-200 text-left relative overflow-hidden group z-10">
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-100 rounded-bl-full -z-10 group-hover:scale-110 transition-transform"></div>
                <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-emerald-600 text-white rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-lg"><i class="fas fa-atom"></i></div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2 heading-font">กฎของนิวตัน</h2>
                <p class="text-slate-500 mb-4">เรียนรู้กฎ 3 ข้อของนิวตันผ่านแอนิเมชันสถานการณ์จำลอง พร้อมคำถามชวนคิด</p>
                <span class="text-emerald-600 font-semibold flex items-center gap-2 group-hover:translate-x-2 transition-transform">เข้าสู่บทเรียน <i class="fas fa-arrow-right"></i></span>
            </button>

            <!-- Quiz Card -->
            <button onclick="navTo('quiz-setup')" class="home-card flex-1 bg-white rounded-3xl p-8 border-2 border-transparent hover:border-purple-200 text-left relative overflow-hidden group z-10">
                <div class="absolute top-0 right-0 w-32 h-32 bg-purple-100 rounded-bl-full -z-10 group-hover:scale-110 transition-transform"></div>
                <div class="w-16 h-16 bg-gradient-to-br from-purple-400 to-purple-600 text-white rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-lg"><i class="fas fa-clipboard-list"></i></div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2 heading-font">แบบทดสอบ (Quiz)</h2>
                <p class="text-slate-500 mb-4">ประเมินความเข้าใจด้วยแบบทดสอบประยุกต์กฎนิวตัน มีทั้งระดับง่าย ปานกลาง และยาก</p>
                <span class="text-purple-600 font-semibold flex items-center gap-2 group-hover:translate-x-2 transition-transform">เริ่มทำแบบทดสอบ <i class="fas fa-arrow-right"></i></span>
            </button>
        </div>
    </div>

    <!-- ================= 2. SIMULATION VIEW ================= -->
    <div id="view-sim" class="view-section flex-col md:flex-row p-2 gap-3 text-slate-700 relative">
        
        <!-- Detailed Solution Modal -->
        <div id="math-modal" class="math-modal fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden flex flex-col">
                <div class="bg-indigo-600 p-4 text-white flex justify-between items-center">
                    <h3 class="text-lg font-bold heading-font"><i class="fas fa-calculator mr-2"></i> เฉลยวิธีทำแบบละเอียด</h3>
                    <button onclick="document.getElementById('math-modal').classList.remove('show')" class="text-white hover:text-indigo-200"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="p-6 overflow-y-auto max-h-[70vh] text-slate-700 bg-slate-50" id="math-solution-content">
                    <!-- Solution injected via JS -->
                </div>
            </div>
        </div>

        <!-- Viewport -->
        <div class="relative w-full md:w-3/4 h-[55vh] md:h-full rounded-2xl overflow-hidden shadow-inner bg-gradient-to-b from-[#e0f2fe] to-[#bae6fd]">
            <button onclick="navTo('home')" class="absolute top-4 left-4 z-30 bg-white/80 hover:bg-white text-slate-700 w-10 h-10 rounded-full shadow flex items-center justify-center transition-colors"><i class="fas fa-home"></i></button>

            <canvas id="gameCanvas" class="absolute top-0 left-0 w-full h-full"></canvas>

            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-3 z-10">
                <button id="btn-reset" class="px-5 py-2 text-sm bg-white text-slate-700 font-bold rounded-full shadow-md hover:bg-slate-50 transition-colors border border-slate-200"><i class="fas fa-stop"></i> รีเซ็ต</button>
                <button id="btn-play" class="px-6 py-2 text-sm bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-bold rounded-full shadow-lg hover:shadow-blue-500/50 transition-all w-32"><i class="fas fa-play"></i> เล่น</button>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="w-full md:w-1/4 h-[40vh] md:h-full glass-panel rounded-2xl p-3 flex flex-col overflow-hidden relative z-20">
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-xl font-bold text-indigo-900 heading-font">โหมดจำลองอิสระ</h1>
            </div>
            
            <div class="mb-2 relative z-50">
                <select id="scen-selector" class="w-full p-2 text-xs font-bold bg-indigo-50 text-indigo-700 rounded-lg border border-indigo-200 outline-none cursor-pointer">
                    <option value="incline">ราบ / พื้นเอียง (Incline)</option>
                    <option value="hanging">แกว่งลูกตุ้ม (Pendulum)</option>
                    <option value="two_strings">สมดุลเชือก 2 เส้น (2 Strings)</option>
                    <option value="elevator">ลิฟต์ (Elevator)</option>
                    <option value="multi_blocks">ดันวัตถุติดกัน (Multi-Blocks)</option>
                </select>
            </div>

            <button onclick="showSolution()" class="mb-2 w-full py-1.5 bg-slate-800 hover:bg-slate-700 text-white text-[11px] font-bold rounded-lg shadow transition-colors"><i class="fas fa-file-signature mr-1"></i> ดูวิธีทำแบบละเอียด</button>

            <div class="flex flex-col gap-2 mb-2" id="dynamic-controls-area">
                <!-- ถูกสร้างด้วย JavaScript -->
            </div>

            <div class="flex gap-1 mb-2 border-b border-slate-200 pb-2">
                <div class="flex items-center justify-center flex-1 py-1 bg-indigo-50 rounded-lg border border-indigo-100 cursor-pointer" id="toggle-fbd-container">
                    <span id="fbd-btn-label" class="text-[9px] font-bold text-indigo-900 mr-1">FBD</span>
                    <button id="btn-toggle-fbd" class="w-6 h-3 rounded-full bg-slate-300 relative pointer-events-none"><div id="fbd-toggle-knob" class="w-2.5 h-2.5 bg-white rounded-full absolute top-[1px] left-[1px] transition-transform"></div></button>
                </div>
                <div class="flex items-center justify-center flex-1 py-1 bg-indigo-50 rounded-lg border border-indigo-100 cursor-pointer" id="toggle-val-container">
                    <span class="text-[9px] font-bold text-indigo-900 mr-1">ตัวเลข</span>
                    <button id="btn-toggle-val" class="w-6 h-3 rounded-full bg-indigo-500 relative pointer-events-none"><div id="val-toggle-knob" class="w-2.5 h-2.5 bg-white rounded-full absolute top-[1px] left-[1px] translate-x-3 transition-transform"></div></button>
                </div>
                <select id="obj-selector" class="flex-1 p-1 text-[9px] rounded-lg border border-slate-200 bg-white outline-none font-bold text-indigo-900 cursor-pointer">
                    <option value="box">ทรงกล่อง</option>
                    <option value="sphere">ทรงกลม</option>
                </select>
            </div>

            <div id="force-adder-section">
                <h2 class="text-[11px] font-semibold mb-1 heading-font text-slate-700">เพิ่มการ์ดแรง (ปรับอิสระ)</h2>
                <div class="grid grid-cols-2 gap-1 mb-2">
                    <button id="add-mg" class="force-add-btn p-1.5 rounded-lg border border-red-200 bg-red-50 text-red-600 text-[10px] font-medium flex items-center justify-center gap-1 hover:bg-red-100"><span class="w-2 h-2 rounded-full bg-red-500"></span> mg</button>
                    <button id="add-N" class="force-add-btn p-1.5 rounded-lg border border-blue-200 bg-blue-50 text-blue-600 text-[10px] font-medium flex items-center justify-center gap-1 hover:bg-blue-100"><span class="w-2 h-2 rounded-full bg-blue-500"></span> N</button>
                    <button id="add-F" class="force-add-btn p-1.5 rounded-lg border border-green-200 bg-green-50 text-green-600 text-[10px] font-medium flex items-center justify-center gap-1 hover:bg-green-100"><span class="w-2 h-2 rounded-full bg-green-500"></span> F</button>
                    <button id="add-f" class="force-add-btn p-1.5 rounded-lg border border-orange-200 bg-orange-50 text-orange-600 text-[10px] font-medium flex items-center justify-center gap-1 hover:bg-orange-100"><span class="w-2 h-2 rounded-full bg-orange-500"></span> f</button>
                </div>
            </div>

            <div id="sliders-container" class="flex-1 flex flex-col gap-2 overflow-y-auto pr-1 pb-4"></div>
        </div>
    </div>

    <!-- ================= NEWTON LAWS VIEW (ADDED) ================= -->
    <div id="view-newton" class="view-section flex-col md:flex-row p-2 gap-3 text-slate-700 relative bg-slate-50">
        <!-- Viewport / Canvas -->
        <div class="relative w-full md:w-2/3 h-[50vh] md:h-full rounded-2xl overflow-hidden shadow-inner bg-gradient-to-b from-[#f8fafc] to-[#e2e8f0]">
            <button onclick="navTo('home')" class="absolute top-4 left-4 z-30 bg-white/80 hover:bg-white text-slate-700 w-10 h-10 rounded-full shadow flex items-center justify-center transition-colors"><i class="fas fa-home"></i></button>
            <canvas id="newtonCanvas" class="absolute top-0 left-0 w-full h-full"></canvas>
            
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-3 z-10">
                <button onclick="resetNewton()" class="px-5 py-2 text-sm bg-white text-slate-700 font-bold rounded-full shadow-md hover:bg-slate-50 border border-slate-200"><i class="fas fa-undo"></i> เริ่มใหม่</button>
                <button id="btn-play-newton" onclick="playNewton()" class="px-6 py-2 text-sm bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold rounded-full shadow-lg hover:shadow-emerald-500/50 w-32"><i class="fas fa-play"></i> จำลอง</button>
            </div>
        </div>

        <!-- Control / Info Panel -->
        <div class="w-full md:w-1/3 h-[50vh] md:h-full glass-panel rounded-2xl p-4 flex flex-col overflow-y-auto relative z-20">
            <h1 class="text-2xl font-bold text-emerald-900 heading-font mb-4"><i class="fas fa-atom mr-2 text-emerald-600"></i> กฎของนิวตัน</h1>
            
            <!-- Tabs -->
            <div class="flex bg-slate-200 rounded-lg p-1 mb-4">
                <button onclick="initNewton(1)" id="tab-law-1" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white shadow text-emerald-700">กฎข้อ 1</button>
                <button onclick="initNewton(2)" id="tab-law-2" class="flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500 hover:text-slate-700">กฎข้อ 2</button>
                <button onclick="initNewton(3)" id="tab-law-3" class="flex-1 py-1.5 text-xs font-bold rounded-md text-slate-500 hover:text-slate-700">กฎข้อ 3</button>
            </div>

            <!-- Content Area -->
            <div id="newton-content" class="flex-1 flex flex-col gap-3">
                <!-- Data injected by JS -->
            </div>
        </div>
    </div>

    <!-- ================= 3. QUIZ SETUP VIEW ================= -->
    <div id="view-quiz-setup" class="view-section flex-col items-center justify-center p-6 bg-slate-50">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center relative border border-slate-100">
            <button onclick="navTo('home')" class="absolute top-4 left-4 text-slate-400 hover:text-slate-700 w-8 h-8 rounded-full flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
            <div class="w-20 h-20 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"><i class="fas fa-brain"></i></div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2 heading-font">ตั้งค่าแบบทดสอบ</h2>
            <div class="mb-6 text-left mt-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">จำนวนข้อที่ต้องการทำ:</label>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-quiz-10" class="quiz-num-btn py-3 border-2 border-purple-500 bg-purple-50 text-purple-700 font-bold rounded-xl transition-colors">10 ข้อ</button>
                    <button id="btn-quiz-20" class="quiz-num-btn py-3 border-2 border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-colors">20 ข้อ</button>
                </div>
            </div>
            <button onclick="startQuiz()" class="w-full py-3 bg-gradient-to-r from-purple-500 to-indigo-600 text-white rounded-xl font-bold text-lg hover:shadow-lg transition-all">เริ่มทำแบบทดสอบ</button>
        </div>
    </div>
    
    <!-- ================= 4. QUIZ ACTIVE VIEW ================= -->
    <div id="view-quiz-active" class="view-section flex-col items-center justify-start p-4 md:p-10 bg-slate-50">
        <div class="w-full max-w-2xl">
            <div class="flex justify-between items-center mb-6">
                <button onclick="navTo('home')" class="text-slate-500 font-medium hover:text-slate-900"><i class="fas fa-times"></i> ออก</button>
                <div class="bg-white px-4 py-1.5 rounded-full shadow-sm text-sm font-bold text-purple-600 border border-purple-100">ข้อ <span id="quiz-curr-idx">1</span> / <span id="quiz-total-idx">10</span></div>
            </div>
            <div class="w-full h-2 bg-slate-200 rounded-full mb-8"><div id="quiz-progress" class="h-full bg-purple-500 rounded-full transition-all duration-300" style="width: 10%;"></div></div>
            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 mb-6 relative">
                <span id="quiz-diff-badge" class="absolute -top-3 right-6 px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full">ง่าย</span>
                <h3 id="quiz-question" class="text-lg md:text-xl font-semibold text-slate-800 mb-6">คำถาม?</h3>
                <div id="quiz-options" class="flex flex-col gap-3"></div>
            </div>
            <div class="flex justify-end hidden" id="quiz-next-container">
                <button onclick="nextQuestion()" class="px-8 py-3 bg-slate-800 text-white font-bold rounded-xl hover:bg-slate-700">ข้อต่อไป <i class="fas fa-arrow-right ml-1"></i></button>
            </div>
        </div>
    </div>
    
    <!-- ================= 5. QUIZ RESULT VIEW ================= -->
    <div id="view-quiz-result" class="view-section flex-col items-center justify-center p-6 bg-slate-50">
        <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-100">
            <div id="result-icon" class="w-24 h-24 rounded-full flex items-center justify-center text-5xl mx-auto mb-4 bg-green-100 text-green-500"><i class="fas fa-trophy"></i></div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2 heading-font" id="result-title">ยอดเยี่ยม!</h2>
            <div class="bg-slate-50 p-4 rounded-xl mb-8 mt-4 border border-slate-200">
                <p class="text-sm text-slate-500 mb-1">คะแนนของคุณ</p>
                <div class="text-5xl font-bold text-slate-800 heading-font"><span id="result-score" class="text-indigo-600">8</span><span class="text-2xl text-slate-400">/10</span></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="navTo('home')" class="py-3 bg-slate-100 font-bold rounded-xl hover:bg-slate-200 text-slate-700">กลับหน้าหลัก</button>
                <button onclick="navTo('quiz-setup')" class="py-3 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700">ทำใหม่อีกครั้ง</button>
            </div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT ================= -->
    <script>
        // ใช้ตัวแปร Global แบบ Lazy-initialization ป้องกันปัญหา Cannot read properties of null
        let canvas, ctx, nCanvas, nCtx;
        let animFrame = null, lastTime = 0, newtonAnimFrame = null;
        
        function getGameCtx() {
            if (!canvas) canvas = document.getElementById('gameCanvas');
            if (canvas && !ctx) ctx = canvas.getContext('2d');
            return ctx;
        }

        function getNewtonCtx() {
            if (!nCanvas) nCanvas = document.getElementById('newtonCanvas');
            if (nCanvas && !nCtx) nCtx = nCanvas.getContext('2d');
            return nCtx;
        }

        function navTo(viewId) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            if (viewId === 'sim') { resize(); draw(); }
            if (viewId === 'newton') { resizeNewton(); initNewton(nlState.law || 1); }
            
            if (animFrame !== null) { cancelAnimationFrame(animFrame); animFrame = null; }
            if (newtonAnimFrame !== null) { cancelAnimationFrame(newtonAnimFrame); newtonAnimFrame = null; }
        }
        
        const BASE_SIZE = 50; 
        const BASE_SCALE = 6;

        const state = {
            mode: 'planning', scenario: 'incline', forces: {}, showFBDOnly: false, showValues: true, objectType: 'box',
            bridgeStart: 0, floorY: 0,
            incline: { m: 1, angle: 0, s: 0, v: 0, ax: 0, ay: 0 },
            hanging: { m: 1, L: 260, pivotY: 0, theta: 0, omega: 0 },
            two_strings: { m: 1, th1: 45, th2: 45, D: 300, pivotY: 0, x:0, y:0 }, 
            elevator: { m: 10, m_lift: 50, a: 0, p: 0, v: 0 },
            multi_blocks: { num: 2, m1: 2, m2: 2, m3: 2, F: 20, s: 0, v: 0, ax: 0, R12: 0, R23: 0 }
        };

        const colors = { mg: '#ef4444', N: '#3b82f6', F: '#10b981', f: '#f97316', T: '#8b5cf6', T1: '#8b5cf6', T2: '#d946ef', R: '#ea580c' };

            state.bridgeStart = canvas.width / 2;
            state.hanging.pivotY = -state.floorY + 60;
            state.two_strings.pivotY = -state.floorY + 80;

        }
        
        window.addEventListener('resize', () => {

        document.getElementById('toggle-fbd-container').addEventListener('click', () => {
            state.showFBDOnly = !state.showFBDOnly;

        document.getElementById('toggle-val-container').addEventListener('click', () => {

        document.getElementById('scen-selector').addEventListener('change', (e) => setScenario(e.target.value));

        function setScenario(scen) {

            state.forces = {};

                        <input type="range" id="input-angle" min="0" max="60" value="${state.incline.angle}" class="slider-blue" oninput="state.incline.angle=parseInt(this.value); document.getElementById('disp-angle').innerText=this.value+'&deg;'; updateMath(); draw();">

            else if (scen === 'hanging') {
                area.innerHTML = `<div class="bg-white p-2 rounded-lg border border-slate-200 shadow-sm"><div class="flex justify-between items-center mb-1 text-[11px] font-semibold"><span>มุมเริ่มต้น (&theta;)</span><span id="disp-theta">${(state.hanging.theta * 180 / Math.PI).toFixed(0)}&deg;</span></div><input type="range" min="-60" max="60" value="${(state.hanging.theta * 180 / Math.PI).toFixed(0)}" class="slider-blue" oninput="state.hanging.theta=parseInt(this.value)*Math.PI/180; document.getElementById('disp-theta').innerText=this.value+'&deg;'; updateMath(); draw();"></div>`;
                forceSection.style.display = 'block'; ['mg', 'F'].forEach(id => document.getElementById('add-'+id).style.display = 'flex');
                document.getElementById('add-N').style.display = 'none'; document.getElementById('add-f').style.display = 'none';

            else if (scen === 'two_strings') {
                area.innerHTML = `
                    <div class="bg-white p-2 rounded-lg border border-slate-200 mb-1 shadow-sm">
                        <div class="flex justify-between items-center mb-1 text-[11px] font-semibold"><span>มวลวัตถุ (m)</span><span id="disp-m2">${state.two_strings.m} kg</span></div>
                        <input type="range" min="1" max="20" value="${state.two_strings.m}" class="slider-red" oninput="state.two_strings.m=parseInt(this.value); document.getElementById('disp-m2').innerText=this.value+' kg'; updateMath(); draw();">
                    </div>
                    <div class="flex gap-1">
                        <div class="bg-white p-2 rounded-lg border border-slate-200 flex-1 shadow-sm">
                            <div class="flex justify-between items-center mb-1 text-[10px] font-semibold"><span>มุม &theta;1</span><span id="disp-th1">${state.two_strings.th1}&deg;</span></div>
                            <input type="range" min="10" max="80" value="${state.two_strings.th1}" class="slider-purple" oninput="state.two_strings.th1=parseInt(this.value); document.getElementById('disp-th1').innerText=this.value+'&deg;'; updateMath(); draw();">
                        </div>
                        <div class="bg-white p-2 rounded-lg border border-slate-200 flex-1 shadow-sm">
                            <div class="flex justify-between items-center mb-1 text-[10px] font-semibold"><span>มุม &theta;2</span><span id="disp-th2">${state.two_strings.th2}&deg;</span></div>
                            <input type="range" min="10" max="80" value="${state.two_strings.th2}" class="slider-purple" oninput="state.two_strings.th2=parseInt(this.value); document.getElementById('disp-th2').innerText=this.value+'&deg;'; updateMath(); draw();">

                addSliderForce('mg', 50, true, 'W = mg'); addSliderForce('T1', 0, true, 'คำนวณสมดุล'); addSliderForce('T2', 0, true, 'คำนวณสมดุล');

            else if (scen === 'elevator') {
                area.innerHTML = `<div class="flex gap-1 mb-1"><div class="bg-white p-2 rounded-lg border border-slate-200 flex-1 shadow-sm"><div class="flex justify-between items-center mb-1 text-[10px] font-semibold"><span>มวลวัตถุ (m)</span><span id="disp-meobj">${state.elevator.m} kg</span></div><input type="range" min="1" max="50" value="${state.elevator.m}" class="slider-red" oninput="state.elevator.m=parseInt(this.value); document.getElementById('disp-meobj').innerText=this.value+' kg'; updateMath(); draw();"></div><div class="bg-white p-2 rounded-lg border border-slate-200 flex-1 shadow-sm"><div class="flex justify-between items-center mb-1 text-[10px] font-semibold"><span>มวลลิฟต์ (M)</span><span id="disp-mlift">${state.elevator.m_lift} kg</span></div><input type="range" min="10" max="200" value="${state.elevator.m_lift}" step="10" class="slider-blue" oninput="state.elevator.m_lift=parseInt(this.value); document.getElementById('disp-mlift').innerText=this.value+' kg'; updateMath(); draw();"></div></div><div class="bg-white p-2 rounded-lg border border-slate-200 shadow-sm"><div class="flex justify-between items-center mb-1 text-[11px] font-semibold"><span>ความเร่งลิฟต์ (a)</span><span id="disp-a">${state.elevator.a} m/s&sup2;</span></div><input type="range" id="sim-ele-a" min="-5" max="5" value="${state.elevator.a}" class="slider-teal" oninput="state.elevator.a=parseInt(this.value); document.getElementById('disp-a').innerText=this.value+' m/s²'; updateMath(); draw();"></div>`;
                addSliderForce('mg', 100, true, 'น้ำหนักวัตถุ'); addSliderForce('N', 100, true, 'N = m(g+a)'); addSliderForce('T', 600, true, 'T = (M+m)(g+a)');
            }
            else if (scen === 'multi_blocks') {
                area.innerHTML = `<div class="bg-white p-2 rounded-lg border border-slate-200 mb-1 shadow-sm"><select class="w-full text-xs outline-none" onchange="state.multi_blocks.num=parseInt(this.value); updateMath(); draw();"><option value="2" ${state.multi_blocks.num===2?'selected':''}>ดัน 2 กล่อง (m1, m2)</option><option value="3" ${state.multi_blocks.num===3?'selected':''}>ดัน 3 กล่อง (m1, m2, m3)</option></select></div><div class="flex gap-1 mb-1"><div class="bg-white p-1.5 rounded-lg border border-slate-200 flex-1 text-center shadow-sm"><div class="text-[9px] font-semibold">m1</div><input type="range" min="1" max="10" value="${state.multi_blocks.m1}" class="slider-red" oninput="state.multi_blocks.m1=parseInt(this.value); updateMath(); draw();"></div><div class="bg-white p-1.5 rounded-lg border border-slate-200 flex-1 text-center shadow-sm"><div class="text-[9px] font-semibold">m2</div><input type="range" min="1" max="10" value="${state.multi_blocks.m2}" class="slider-blue" oninput="state.multi_blocks.m2=parseInt(this.value); updateMath(); draw();"></div><div class="bg-white p-1.5 rounded-lg border border-slate-200 flex-1 text-center shadow-sm" id="ctrl-m3" style="display:${state.multi_blocks.num===3?'block':'none'};"><div class="text-[9px] font-semibold">m3</div><input type="range" min="1" max="10" value="${state.multi_blocks.m3}" class="slider-green" oninput="state.multi_blocks.m3=parseInt(this.value); updateMath(); draw();"></div></div>`;
                forceSection.style.display = 'block'; ['mg', 'N', 'F', 'f'].forEach(id => document.getElementById('add-'+id).style.display = 'flex');
                document.getElementById('add-T').style.display = 'none';
                addSliderForce('F', 20, false, 'แรงผลักวัตถุ');
            }
            updateMath(); draw();
        }

        document.querySelectorAll('.force-add-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (state.mode !== 'planning') return;
                const type = e.target.id.replace('add-', '');
                if (state.forces[type] !== undefined) return;
                let val = (type === 'mg' || type === 'N') ? 10 : (type === 'f' ? 2 : 10);
                addSliderForce(type, val, type === 'N' && state.scenario === 'incline', type === 'N' ? 'ปรับตามสมดุล' : '');
            });
        });

        // ล็อกไม่ให้ปรับแรง N ได้ แต่แสดงค่าที่คำนวณอัตโนมัติ
        function addSliderForce(type, defaultVal, isAuto, autoMsg) {
            state.forces[type] = defaultVal;
            const container = document.getElementById('sliders-container');
            const empty = document.getElementById('empty-state');
            if (empty) empty.style.display = 'none';
            const colorsMap = { mg: 'red', N: 'blue', F: 'green', f: 'orange', T: 'purple', T1: 'purple', T2: 'purple' };
            const c = colorsMap[type] || 'slate';
            const isN = (type === 'N'); 
            
            container.insertAdjacentHTML('beforeend', `
                <div class="p-2 bg-${c}-50 border border-${c}-200 rounded-lg shadow-sm relative" id="slider-group-${type}">
                    ${(!isAuto && ['incline','hanging','multi_blocks'].includes(state.scenario)) ? `<button onclick="removeForce('${type}')" class="absolute top-1 right-1 text-slate-400 hover:text-red-500 text-xs w-4 h-4">&times;</button>` : ''}
                    <div class="flex justify-between items-center mb-1 pr-4">
                        <label class="font-medium text-${c}-700 text-[10px]">${type}</label>
                        <span class="font-bold text-${c}-700 text-[10px] bg-white px-1.5 py-0.5 rounded" id="val-${type}">${defaultVal.toFixed(0)} N</span>
                    </div>
                    ${autoMsg ? `<div class="text-[8px] text-slate-500 mb-0.5">${autoMsg}</div>` : ''}
                    ${!isN ? `<input type="range" min="0" max="${['T','mg','N'].includes(type)?200:50}" step="1" value="${defaultVal}" class="slider-${c}" id="input-${type}" ${isAuto ? 'disabled' : ''} oninput="updateFVal('${type}', this.value)">` : `<div class="text-[9px] text-blue-600 font-medium italic">ค่านี้ถูกคำนวณตามสมดุลอัตโนมัติ</div>`}
                </div>
            `);
            updateMath(); draw();
        }
        
        window.updateFVal = (type, val) => { state.forces[type] = parseInt(val); document.getElementById(`val-${type}`).innerText = `${val} N`; updateMath(); draw(); };
        window.removeForce = (type) => { delete state.forces[type]; document.getElementById(`slider-group-${type}`).remove(); if(Object.keys(state.forces).length === 0) document.getElementById('empty-state').style.display = 'block'; updateMath(); draw(); };

        function updateMath() {
            const sc = state.scenario;

            if (sc === 'incline') {
                const W = state.forces['mg'] || 0, F = state.forces['F'] || 0, f = state.forces['f'] || 0, rad = state.incline.angle * Math.PI / 180;
                if (state.forces['N'] !== undefined) {
                    state.forces['N'] = parseFloat((W * Math.cos(rad)).toFixed(1));
                    const el = document.getElementById('input-N'); if(el) { el.value = state.forces['N']; }
                    const valN = document.getElementById('val-N'); if(valN) valN.innerText = state.forces['N']+' N';
                }
                state.incline.ay = ( (state.forces['N']||0) - W*Math.cos(rad) ) / state.incline.m;
                state.incline.ax = (F - f - W*Math.sin(rad)) / state.incline.m;
            } 
            else if (sc === 'hanging') {
                const W = state.forces['mg'] || 0, F = state.forces['F'] || 0, th = state.hanging.theta, m = state.hanging.m;
                const at = (F * Math.cos(th) - W * Math.sin(th)) / m;
                if (state.forces['T'] !== undefined) {
                    const L_m = state.hanging.L / 50; const v = state.hanging.omega * L_m; const ac = (v * v) / L_m;
                    state.forces['T'] = parseFloat((W * Math.cos(th) + F * Math.sin(th) + m * ac).toFixed(1));
                    const el = document.getElementById('input-T'); if(el) { el.value = Math.min(state.forces['T'], 200); document.getElementById('val-T').innerText = state.forces['T']+' N'; }
                }
            }
            else if (sc === 'two_strings') {
                const W = state.two_strings.m * 10;
                const th1 = state.two_strings.th1 * Math.PI / 180;
                const th2 = state.two_strings.th2 * Math.PI / 180;
                
                const D = state.two_strings.D;
                const x = D * Math.tan(th2) / (Math.tan(th1) + Math.tan(th2));
                const y = x * Math.tan(th1);
                state.two_strings.x = x - D/2;
                state.two_strings.y = y;

                const T2 = W / ( (Math.cos(th2)/Math.cos(th1))*Math.sin(th1) + Math.sin(th2) );
                const T1 = T2 * Math.cos(th2) / Math.cos(th1);

                if (state.forces['mg'] !== undefined) { state.forces['mg'] = W; const el = document.getElementById('input-mg'); if(el) { el.value = W; document.getElementById('val-mg').innerText = W+' N'; } }
                if (state.forces['T1'] !== undefined) { state.forces['T1'] = parseFloat(T1.toFixed(1)); const el = document.getElementById('input-T1'); if(el) { el.value = Math.min(T1, 200); document.getElementById('val-T1').innerText = T1.toFixed(1)+' N'; } }
                if (state.forces['T2'] !== undefined) { state.forces['T2'] = parseFloat(T2.toFixed(1)); const el = document.getElementById('input-T2'); if(el) { el.value = Math.min(T2, 200); document.getElementById('val-T2').innerText = T2.toFixed(1)+' N'; } }
            }
            else if (sc === 'elevator') {
                const m = state.elevator.m, M = state.elevator.m_lift, a = state.elevator.a;
                if (state.forces['mg'] !== undefined) { state.forces['mg'] = m * 10; const el = document.getElementById('input-mg'); if(el) { el.value = m*10; document.getElementById('val-mg').innerText = (m*10)+' N'; } }
                if (state.forces['N'] !== undefined) { 
                    state.forces['N'] = m * (10 + a); 
                    const valN = document.getElementById('val-N'); if(valN) valN.innerText = state.forces['N']+' N'; 
                }
                if (state.forces['T'] !== undefined) { state.forces['T'] = (M + m) * (10 + a); const el = document.getElementById('input-T'); if(el) { el.value = state.forces['T']; document.getElementById('val-T').innerText = state.forces['T']+' N'; } }
            }
            else if (sc === 'multi_blocks') {
                const m1 = state.multi_blocks.m1, m2 = state.multi_blocks.m2, m3 = state.multi_blocks.m3, num = state.multi_blocks.num;
                const el3 = document.getElementById('ctrl-m3'); if (el3) el3.style.display = num===3?'block':'none';
                const M_tot = m1 + m2 + (num===3?m3:0);
                if (state.forces['mg'] !== undefined) { state.forces['mg'] = M_tot * 10; const el = document.getElementById('input-mg'); if(el) { el.value = state.forces['mg']; document.getElementById('val-mg').innerText = state.forces['mg']+' N'; } }
                if (state.forces['N'] !== undefined) { 
                    state.forces['N'] = state.forces['mg'] || (M_tot * 10); 
                    const valN = document.getElementById('val-N'); if(valN) valN.innerText = state.forces['N']+' N'; 
                }
                const F = state.forces['F'] || 0, f = state.forces['f'] || 0;
                state.multi_blocks.ax = Math.max(0, (F - f) / M_tot);
                state.multi_blocks.R12 = (m2 + (num===3?m3:0)) * (F / M_tot);
                state.multi_blocks.R23 = num===3 ? m3 * (F / M_tot) : 0;
            }
        }

        // --- Core Drawing ---
        function drawArrow(cx_input, cy_input, tox, toy, color, label, val, isDashed = false, largeText = false, liftText = false) {
            let activeCtx = getGameCtx();
            if(!activeCtx) return;

            const dx = tox - cx_input, dy = toy - cy_input, len = Math.sqrt(dx*dx + dy*dy);
            if (len < 1) return; // ไม่วาดถ้าแรงเกือบศูนย์
            const angle = Math.atan2(dy, dx);
            
            const headlen = Math.min(15.6, len*0.52); 
            const shortenPx = headlen * 0.85; 
            const endX = tox - Math.cos(angle) * shortenPx;
            const endY = toy - Math.sin(angle) * shortenPx;

            activeCtx.lineJoin = 'round';
            activeCtx.beginPath(); activeCtx.moveTo(cx_input, cy_input); activeCtx.lineTo(endX, endY);
            activeCtx.strokeStyle = color; activeCtx.lineWidth = isDashed ? 2 : 4;
            if (isDashed) activeCtx.setLineDash([5, 5]); activeCtx.stroke(); activeCtx.setLineDash([]);
            
            activeCtx.lineJoin = 'miter';
            activeCtx.beginPath();
            activeCtx.moveTo(tox, toy); 
            activeCtx.lineTo(tox - headlen * Math.cos(angle - Math.PI/9), toy - headlen * Math.sin(angle - Math.PI/9));
            activeCtx.lineTo(tox - headlen * Math.cos(angle + Math.PI/9), toy - headlen * Math.sin(angle + Math.PI/9)); 
            activeCtx.closePath();
            activeCtx.fillStyle = color; activeCtx.fill();

            if (!label) return;
            let textToDraw = state.showValues && val !== undefined ? `${label}=${val}` : label;
            let fontSize = largeText ? 24 : (isDashed ? 13 : 15); 
            let offset = largeText ? 35 : (isDashed ? 20 : 25);
            
            activeCtx.fillStyle = color; activeCtx.font = isDashed ? `normal ${fontSize}px Prompt` : `bold ${fontSize}px Prompt`;
            activeCtx.textAlign = "center"; activeCtx.textBaseline = "middle";
            let tx = tox + Math.cos(angle)*offset;
            let ty = toy + Math.sin(angle)*offset;
            
            if (liftText) { tx += Math.cos(angle + Math.PI/2) * 20; ty += Math.sin(angle + Math.PI/2) * 20; }
            
            activeCtx.shadowColor = 'rgba(255,255,255,0.95)'; activeCtx.shadowBlur = 5;
            activeCtx.fillText(textToDraw, tx, ty); activeCtx.fillText(textToDraw, tx, ty); activeCtx.shadowBlur = 0;
            activeCtx.fillText(textToDraw, tx, ty);
        }

        function drawFBDAxes(cx, cy) {
            let activeCtx = getGameCtx();
            if(!activeCtx) return;
            activeCtx.save();
            activeCtx.strokeStyle = 'rgba(148, 163, 184, 0.6)'; // สีเทาโปร่งแสง
            activeCtx.lineWidth = 1.5;
            activeCtx.setLineDash([6, 4]); // เส้นประ
            
            activeCtx.beginPath(); activeCtx.moveTo(cx - 200, cy); activeCtx.lineTo(cx + 200, cy); activeCtx.stroke();
            activeCtx.beginPath(); activeCtx.moveTo(cx, cy - 200); activeCtx.lineTo(cx, cy + 200); activeCtx.stroke();
            
            activeCtx.fillStyle = 'rgba(100, 116, 139, 0.9)';
            activeCtx.font = 'bold 12px Prompt';
            activeCtx.fillText('+x', cx + 185, cy + 15);
            activeCtx.fillText('+y', cx - 18, cy - 185);
            activeCtx.restore();
        }

        function drawShape(x, y, size, rotation) {
            let activeCtx = getGameCtx();
            if(!activeCtx) return;
            activeCtx.save();
            activeCtx.translate(x, y);
            activeCtx.rotate(rotation);
            if (state.objectType === 'sphere') {
                const grad = activeCtx.createRadialGradient(-size/6, -size/6, size/10, 0, 0, size/2);
                grad.addColorStop(0, '#e2e8f0'); grad.addColorStop(1, '#64748b');
                activeCtx.fillStyle = grad;
                activeCtx.beginPath(); activeCtx.arc(0, 0, size/2, 0, Math.PI*2); activeCtx.fill();
                activeCtx.strokeStyle = '#334155'; activeCtx.lineWidth = 3; activeCtx.stroke();
            } else { 
                activeCtx.fillStyle = '#d97706'; activeCtx.fillRect(-size/2, -size/2, size, size);
                activeCtx.strokeStyle = '#92400e'; activeCtx.lineWidth = 3; activeCtx.strokeRect(-size/2, -size/2, size, size);
            }
            activeCtx.restore();
        }

        function drawBox(x, y, size, color, border, label) {
            let activeCtx = getGameCtx();
            if(!activeCtx) return;
            activeCtx.fillStyle = color; activeCtx.fillRect(x - size/2, y - size/2, size, size);
            activeCtx.strokeStyle = border; activeCtx.lineWidth = 3; activeCtx.strokeRect(x - size/2, y - size/2, size, size);
            activeCtx.fillStyle = '#fff'; activeCtx.font = "bold 16px Prompt"; activeCtx.textAlign = "center"; activeCtx.textBaseline = "middle";
            if (label) activeCtx.fillText(label, x, y);
        }

        function draw() {
            let activeCtx = getGameCtx();
            if (!activeCtx || !canvas) return;

            activeCtx.clearRect(0, 0, canvas.width, canvas.height);
            activeCtx.save();
            activeCtx.translate(state.bridgeStart, state.floorY);
            
            const sc = state.scenario;
            const size = BASE_SIZE; 
            
            const maxForceVal = Math.max(0, ...Object.values(state.forces));
            let scale = BASE_SCALE;
            const maxArrowPx = canvas.height * 0.35; 
            if (maxForceVal * scale > maxArrowPx && maxForceVal > 0) {
                scale = maxArrowPx / maxForceVal;
            }

            if (sc === 'incline') {
                const rad = state.incline.angle * Math.PI / 180;
                
                activeCtx.fillStyle = '#e2e8f0'; 
                activeCtx.fillRect(-canvas.width, 0, canvas.width*2, canvas.height);
                
                activeCtx.strokeStyle = '#94a3b8'; activeCtx.lineWidth = 3; activeCtx.setLineDash([8, 8]);
                activeCtx.beginPath(); activeCtx.moveTo(-canvas.width, 0); activeCtx.lineTo(canvas.width, 0); activeCtx.stroke();
                activeCtx.setLineDash([]);

                if (state.incline.angle > 0) {
                    activeCtx.strokeStyle = '#334155'; activeCtx.lineWidth = 3;
                    activeCtx.beginPath(); activeCtx.arc(0, 0, 100, 0, -rad, true); activeCtx.stroke();
                    activeCtx.fillStyle = '#334155'; activeCtx.font = "bold 18px Prompt";
                    activeCtx.fillText(`θ = ${state.incline.angle}°`, 140, -30);
                }

                activeCtx.rotate(-rad);

                activeCtx.fillStyle = '#bbf7d0';
                activeCtx.beginPath(); activeCtx.moveTo(-canvas.width*2, 0); activeCtx.lineTo(canvas.width*2, 0);
                activeCtx.lineTo(canvas.width*2, canvas.height*2); activeCtx.lineTo(-canvas.width*2, canvas.height*2); activeCtx.fill();

                activeCtx.strokeStyle = '#22c55e'; activeCtx.lineWidth = 4;
                activeCtx.beginPath(); activeCtx.moveTo(-canvas.width*2, 0); activeCtx.lineTo(canvas.width*2, 0); activeCtx.stroke();

                const drawX = state.incline.s, drawY = -size/2 - state.incline.p;

                activeCtx.fillStyle = 'rgba(250, 204, 21, 0.4)'; activeCtx.fillRect(state.incline.targetS, -80, 80, 80);
                activeCtx.strokeStyle = '#eab308'; activeCtx.setLineDash([5,5]); activeCtx.strokeRect(state.incline.targetS, -80, 80, 80); activeCtx.setLineDash([]);
                
                if (state.showFBDOnly) { 
                    drawFBDAxes(drawX, drawY);
                    activeCtx.fillStyle = '#1e293b'; activeCtx.beginPath(); activeCtx.arc(drawX, drawY, 6, 0, Math.PI * 2); activeCtx.fill(); 
                }
                else drawShape(drawX, drawY, size, 0);

                const startOffset = state.showFBDOnly ? 0 : size/2;
                for (const [type, val] of Object.entries(state.forces)) {
                    if (val <= 0) continue;
                    const rad = state.incline.angle * Math.PI / 180; const len = val * scale;
                    if (type === 'mg' && state.incline.angle > 0) {
                        const Wy = val * Math.cos(rad), Wx = val * Math.sin(rad);
                        let angleMain = Math.PI / 2 + rad;
                        drawArrow(drawX, drawY, drawX + Math.cos(angleMain)*(len+startOffset), drawY + Math.sin(angleMain)*(len+startOffset), 'rgba(239, 68, 68, 0.3)', type, val);
                        if (Wy>0) drawArrow(drawX, drawY, drawX, drawY + (Wy*scale)+startOffset, '#991b1b', 'mg_y', Wy.toFixed(1), true);
                        if (Wx>0) drawArrow(drawX, drawY, drawX - (Wx*scale)-startOffset, drawY, '#991b1b', 'mg_x', Wx.toFixed(1), true, false, true); 
                    } else if (type === 'f' && state.incline.angle > 0 && state.forces['mg']) {
                        let Wx = state.forces['mg'] * Math.sin(rad);
                        let fromX = drawX - (Wx*scale) - startOffset;
                        drawArrow(fromX, drawY, fromX - (val*scale), drawY, colors[type], type, val);
                    } else {
                        let angle = (type === 'mg') ? (Math.PI / 2 + rad) : (type === 'N' ? -Math.PI/2 : (type === 'F' ? 0 : Math.PI));
                        drawArrow(drawX + Math.cos(angle)*startOffset, drawY + Math.sin(angle)*startOffset, drawX + Math.cos(angle)*(len+startOffset), drawY + Math.sin(angle)*(len+startOffset), colors[type], type, val);
                    }
                }
            } 
            else if (sc === 'hanging') {
                const pY = state.hanging.pivotY;
                const drawX = state.hanging.L * Math.sin(state.hanging.theta);
                const drawY = pY + state.hanging.L * Math.cos(state.hanging.theta);

                activeCtx.fillStyle = '#94a3b8'; activeCtx.fillRect(-150, pY - 20, 300, 20); 
                
                activeCtx.strokeStyle = '#94a3b8'; activeCtx.lineWidth = 2; activeCtx.setLineDash([5, 5]);
                activeCtx.beginPath(); activeCtx.moveTo(0, pY); activeCtx.lineTo(0, pY + state.hanging.L + 40); activeCtx.stroke();
                activeCtx.setLineDash([]);
                
                if (Math.abs(state.hanging.theta) > 0.05) {
                    activeCtx.strokeStyle = '#3b82f6'; activeCtx.lineWidth = 2;
                    activeCtx.beginPath();
                    const startAngle = Math.PI / 2;
                    const endAngle = Math.PI / 2 - state.hanging.theta;
                    activeCtx.arc(0, pY, 70, Math.min(startAngle, endAngle), Math.max(startAngle, endAngle));
                    activeCtx.stroke();
                    
                    activeCtx.fillStyle = '#3b82f6'; activeCtx.font = "bold 14px Prompt";
                    const textAngle = Math.PI / 2 - state.hanging.theta / 2;
                    activeCtx.fillText(`θ=${Math.abs((state.hanging.theta * 180 / Math.PI)).toFixed(0)}°`, Math.cos(textAngle) * 95, pY + Math.sin(textAngle) * 95);
                }

                if (state.forces['T']) { activeCtx.strokeStyle = '#b45309'; activeCtx.lineWidth = 3; activeCtx.beginPath(); activeCtx.moveTo(0, pY); activeCtx.lineTo(drawX, drawY); activeCtx.stroke(); }
                
                if (state.showFBDOnly) { 
                    drawFBDAxes(drawX, drawY);
                    activeCtx.fillStyle = '#1e293b'; activeCtx.beginPath(); activeCtx.arc(drawX, drawY, 6, 0, Math.PI * 2); activeCtx.fill(); 
                }
                else drawShape(drawX, drawY, size, -state.hanging.theta);

                const startOffset = state.showFBDOnly ? 0 : size/2;
                for (const [type, val] of Object.entries(state.forces)) {
                    if (val <= 0) continue;
                    const len = val * scale;
                    let angle = type === 'mg' ? Math.PI/2 : (type === 'F' ? 0 : Math.atan2(pY - drawY, -drawX));
                    
                    if (type === 'T' && Math.abs(state.hanging.theta) > 0.05) {
                        let Ty = val * Math.cos(state.hanging.theta), Tx = val * Math.sin(state.hanging.theta);
                        drawArrow(drawX, drawY, drawX + Math.cos(angle)*(len+startOffset), drawY + Math.sin(angle)*(len+startOffset), 'rgba(139, 92, 246, 0.4)', type, val);
                        if(Ty>0) drawArrow(drawX, drawY - startOffset, drawX, drawY - startOffset - (Ty*scale), '#7e22ce', 'T_y', Ty.toFixed(1), true);
                        let dirX = state.hanging.theta > 0 ? -1 : 1;
                        if(Tx>0) drawArrow(drawX + dirX*startOffset, drawY, drawX + dirX*(startOffset + Tx*scale), drawY, '#7e22ce', 'T_x', Math.abs(Tx).toFixed(1), true, false, true);
                    } else {
                        drawArrow(drawX + Math.cos(angle)*startOffset, drawY + Math.sin(angle)*startOffset, drawX + Math.cos(angle)*(len+startOffset), drawY + Math.sin(angle)*(len+startOffset), colors[type], type, val);
                    }
                }
            }
            else if (sc === 'two_strings') {
                const pY = state.two_strings.pivotY;
                const D = state.two_strings.D;
                const x = state.two_strings.x, y = pY + state.two_strings.y;
                const th1 = state.two_strings.th1 * Math.PI / 180;
                const th2 = state.two_strings.th2 * Math.PI / 180;

                activeCtx.fillStyle = '#94a3b8'; activeCtx.fillRect(-D/2 - 50, pY - 20, D + 100, 20); 
                activeCtx.fillStyle = '#334155'; activeCtx.beginPath(); activeCtx.arc(-D/2, pY, 5, 0, Math.PI*2); activeCtx.fill(); activeCtx.beginPath(); activeCtx.arc(D/2, pY, 5, 0, Math.PI*2); activeCtx.fill();

                activeCtx.strokeStyle = '#b45309'; activeCtx.lineWidth = 3; 
                activeCtx.beginPath(); activeCtx.moveTo(-D/2, pY); activeCtx.lineTo(x, y); activeCtx.stroke();
                activeCtx.beginPath(); activeCtx.moveTo(D/2, pY); activeCtx.lineTo(x, y); activeCtx.stroke();

                activeCtx.strokeStyle = '#64748b'; activeCtx.lineWidth = 2; activeCtx.setLineDash([4,4]);
                activeCtx.beginPath(); activeCtx.moveTo(-D/2, pY); activeCtx.lineTo(-D/2 + 60, pY); activeCtx.stroke();
                activeCtx.beginPath(); activeCtx.moveTo(D/2, pY); activeCtx.lineTo(D/2 - 60, pY); activeCtx.stroke();
                activeCtx.setLineDash([]);
                
                activeCtx.strokeStyle = '#3b82f6'; activeCtx.beginPath(); activeCtx.arc(-D/2, pY, 40, 0, th1); activeCtx.stroke();
                activeCtx.beginPath(); activeCtx.arc(D/2, pY, 40, Math.PI - th2, Math.PI); activeCtx.stroke();
                activeCtx.fillStyle = '#3b82f6'; activeCtx.font = "bold 14px Prompt"; activeCtx.fillText(`θ1=${state.two_strings.th1}°`, -D/2 + 55, pY + 25);
                activeCtx.fillText(`θ2=${state.two_strings.th2}°`, D/2 - 55, pY + 25);

                if (state.showFBDOnly) { 
                    drawFBDAxes(x, y);
                    activeCtx.fillStyle = '#1e293b'; activeCtx.beginPath(); activeCtx.arc(x, y, 6, 0, Math.PI * 2); activeCtx.fill(); 
                }
                else drawShape(x, y, size, 0);

                const startOffset = state.showFBDOnly ? 0 : size/2;
                if (state.forces['mg']) drawArrow(x, y + startOffset, x, y + startOffset + (state.forces['mg']*scale), colors.mg, 'mg', state.forces['mg']);
                if (state.forces['T1']) {
                    const a1 = Math.atan2(pY - y, -D/2 - x);
                    drawArrow(x + Math.cos(a1)*startOffset, y + Math.sin(a1)*startOffset, x + Math.cos(a1)*(startOffset+state.forces['T1']*scale), y + Math.sin(a1)*(startOffset+state.forces['T1']*scale), colors.T1, 'T1', state.forces['T1']);
                }
                if (state.forces['T2']) {
                    const a2 = Math.atan2(pY - y, D/2 - x);
                    drawArrow(x + Math.cos(a2)*startOffset, y + Math.sin(a2)*startOffset, x + Math.cos(a2)*(startOffset+state.forces['T2']*scale), y + Math.sin(a2)*(startOffset+state.forces['T2']*scale), colors.T2, 'T2', state.forces['T2']);
                }
            }
            else if (sc === 'elevator') {
                const eleY = -state.elevator.p;
                const cH = 150, cW = 120;
                
                activeCtx.strokeStyle = '#cbd5e1'; activeCtx.lineWidth = 8;
                activeCtx.beginPath(); activeCtx.moveTo(-cW/2-15, eleY+50); activeCtx.lineTo(-cW/2-15, -1000); activeCtx.moveTo(cW/2+15, eleY+50); activeCtx.lineTo(cW/2+15, -1000); activeCtx.stroke();

                activeCtx.strokeStyle = '#475569'; activeCtx.lineWidth = 6; activeCtx.strokeRect(-cW/2, eleY - cH, cW, cH);
                activeCtx.fillStyle = 'rgba(241, 245, 249, 0.4)'; activeCtx.fillRect(-cW/2, eleY - cH, cW, cH);
                activeCtx.fillStyle = '#94a3b8'; activeCtx.fillRect(-cW/2, eleY, cW, 10);
                activeCtx.strokeStyle = '#334155'; activeCtx.lineWidth = 5; activeCtx.beginPath(); activeCtx.moveTo(0, eleY - cH); activeCtx.lineTo(0, -1000); activeCtx.stroke(); 

                const drawX = 0, drawY = eleY - size/2;
                if (state.showFBDOnly) { 
                    drawFBDAxes(drawX, drawY);
                    activeCtx.fillStyle = '#1e293b'; activeCtx.beginPath(); activeCtx.arc(drawX, drawY, 6, 0, Math.PI * 2); activeCtx.fill(); 
                }
                else drawBox(drawX, drawY, size, '#d97706', '#92400e');

                const startOffset = state.showFBDOnly ? 0 : size/2;
                if (state.forces['mg']) drawArrow(drawX, drawY + startOffset, drawX, drawY + startOffset + state.forces['mg']*scale, colors.mg, 'mg', state.forces['mg'], false, true);
                if (state.forces['N']) drawArrow(drawX, drawY - startOffset, drawX, drawY - startOffset - state.forces['N']*scale, colors.N, 'N', state.forces['N'], false, true);
                if (state.forces['T']) drawArrow(0, eleY - cH, 0, eleY - cH - state.forces['T']*scale, colors.T, 'T', state.forces['T'], false, true);
            }
            else if (sc === 'multi_blocks') {
                activeCtx.fillStyle = '#bbf7d0'; activeCtx.fillRect(-canvas.width*2, 0, canvas.width * 4, canvas.height * 2);
                const num = state.multi_blocks.num, m1 = state.multi_blocks.m1, m2 = state.multi_blocks.m2, m3 = state.multi_blocks.m3;
                
                const w1 = 80 + m1*10, w2 = 80 + m2*10, w3 = 80 + m3*10;
                const h = 100; const y = 0;
                let startX = state.multi_blocks.s - (w1+w2+(num===3?w3:0))/2;

                activeCtx.font = "bold 24px Prompt"; activeCtx.textAlign = "center"; activeCtx.textBaseline = "middle";

                activeCtx.fillStyle = '#3b82f6'; activeCtx.fillRect(startX, y-h, w1, h); activeCtx.strokeRect(startX, y-h, w1, h);
                activeCtx.fillStyle = '#fff'; activeCtx.fillText("m1", startX + w1/2, y-h/2);
                
                activeCtx.fillStyle = '#ef4444'; activeCtx.fillRect(startX+w1, y-h, w2, h); activeCtx.strokeRect(startX+w1, y-h, w2, h);
                activeCtx.fillStyle = '#fff'; activeCtx.fillText("m2", startX+w1 + w2/2, y-h/2);

                if (num === 3) {
                    activeCtx.fillStyle = '#10b981'; activeCtx.fillRect(startX+w1+w2, y-h, w3, h); activeCtx.strokeRect(startX+w1+w2, y-h, w3, h);
                    activeCtx.fillStyle = '#fff'; activeCtx.fillText("m3", startX+w1+w2 + w3/2, y-h/2);
                }

                const F = state.forces['F'] || 0, f = state.forces['f'] || 0, W = state.forces['mg'] || 0, N = state.forces['N'] || 0;
                const cx = startX + (w1+w2+(num===3?w3:0))/2; 
                
                if (F > 0) drawArrow(startX - Math.min(F*scale, maxArrowPx) - 10, y - h/2, startX - 5, y - h/2, colors.F, 'F', F);
                if (f > 0) drawArrow(cx + Math.min(f*scale, maxArrowPx)/2, y, cx - Math.min(f*scale, maxArrowPx)/2, y, colors.f, 'f', f);
                if (W > 0) drawArrow(cx, y - h/2, cx, y - h/2 + Math.min(W*scale, maxArrowPx), colors.mg, 'mg', W);
                if (N > 0) drawArrow(cx, y - h/2, cx, y - h/2 - Math.min(N*scale, maxArrowPx), colors.N, 'N', N);

                const R12 = state.multi_blocks.R12;
                if (R12 > 0) {
                    drawArrow(startX+w1, y - h*0.75, startX+w1 + Math.min(R12*scale, maxArrowPx), y - h*0.75, colors.R, 'R(12)', R12.toFixed(1));
                    drawArrow(startX+w1, y - h*0.25, startX+w1 - Math.min(R12*scale, maxArrowPx), y - h*0.25, '#dc2626', 'R(21)', R12.toFixed(1));
                }
                if (num === 3) {
                    const R23 = state.multi_blocks.R23;
                    if (R23 > 0) {
                        drawArrow(startX+w1+w2, y - h*0.75, startX+w1+w2 + Math.min(R23*scale, maxArrowPx), y - h*0.75, colors.R, 'R(23)', R23.toFixed(1));
                        drawArrow(startX+w1+w2, y - h*0.25, startX+w1+w2 - Math.min(R23*scale, maxArrowPx), y - h*0.25, '#dc2626', 'R(32)', R23.toFixed(1));
                    }
                }
            }

            activeCtx.restore();
        }

        // --- Game Loop ---
        function simulate(timestamp) {
            if (state.mode !== 'playing') return;
            if (!lastTime) { lastTime = timestamp; }
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1); 
            lastTime = timestamp;

            const visualScale = 60; const sc = state.scenario;
            if (sc === 'elevator') { state.elevator.v += state.elevator.a * (visualScale/1.5) * dt; state.elevator.p += state.elevator.v * dt; }
            else if (sc === 'incline') { state.incline.v += state.incline.ax * visualScale * dt; state.incline.s += state.incline.v * dt; state.incline.p += state.incline.ay * visualScale * dt; }
            else if (sc === 'hanging') {
                const W = state.forces['mg'] || 0, F = state.forces['F'] || 0, m = state.hanging.m, L_m = state.hanging.L / 50; 
                const at = (F * Math.cos(state.hanging.theta) - W * Math.sin(state.hanging.theta)) / m;
                state.hanging.omega += (at / L_m) * dt; state.hanging.omega *= 0.995; state.hanging.theta += state.hanging.omega * dt;
            } 
            else if (sc === 'multi_blocks') { state.multi_blocks.v += state.multi_blocks.ax * visualScale * dt; state.multi_blocks.s += state.multi_blocks.v * dt; }

            updateMath(); draw();
            
            if (sc === 'incline' && Math.abs(state.incline.s) > 1000) resetGame();
            if (sc === 'multi_blocks' && Math.abs(state.multi_blocks.s) > 1000) resetGame();

            if (state.mode === 'playing') animFrame = requestAnimationFrame(simulate);
        }

        document.getElementById('btn-play').addEventListener('click', () => {
            if (state.mode === 'planning') {
                state.mode = 'playing';
                state.incline.v = 0; state.incline.s = 0; state.incline.p = 0;
                state.hanging.omega = 0; state.elevator.v = 0; state.elevator.p = 0;
                state.multi_blocks.v = 0; state.multi_blocks.s = 0;
                
                const btn = document.getElementById('btn-play');
                btn.innerHTML = '<i class="fas fa-pause"></i> หยุด';
                btn.classList.replace('from-blue-500', 'from-red-500'); btn.classList.replace('to-indigo-500', 'to-rose-500');
                
                document.querySelectorAll('input[type=range]').forEach(s => { if(s.id!=='sim-ele-a' && !['input-F', 'input-f', 'input-angle'].includes(s.id)) s.disabled = true; });
                
                lastTime = 0;
                animFrame = requestAnimationFrame(simulate);
            } else if (state.mode === 'playing') {
                state.mode = 'planning';
                cancelAnimationFrame(animFrame);
                const btn = document.getElementById('btn-play');
                btn.innerHTML = '<i class="fas fa-play"></i> เล่นต่อ';
                btn.classList.replace('from-red-500', 'from-blue-500'); btn.classList.replace('to-rose-500', 'to-indigo-500');
            }
        });

        document.getElementById('btn-reset').addEventListener('click', resetGame);

        function resetGame() {
            if (animFrame) cancelAnimationFrame(animFrame);
            state.mode = 'planning';
            state.incline.v = 0; state.incline.s = 0; state.incline.p = 0;
            state.hanging.theta = document.getElementById('disp-theta') ? parseInt(document.getElementById('disp-theta').innerText) * Math.PI/180 : 0; state.hanging.omega = 0;
            state.elevator.v = 0; state.elevator.p = 0;
            state.multi_blocks.v = 0; state.multi_blocks.s = 0;
            
            const btn = document.getElementById('btn-play');
            btn.innerHTML = '<i class="fas fa-play"></i> เล่น';
            btn.classList.replace('from-red-500', 'from-blue-500'); btn.classList.replace('to-rose-500', 'to-indigo-500');
            
            document.querySelectorAll('input[type=range]').forEach(s => {
                if (s.id==='input-N') return; 
                if (s.id==='input-T' && ['hanging','elevator'].includes(state.scenario)) return;
                if (['input-T1','input-T2','input-mg'].includes(s.id) && state.scenario==='two_strings') return;
                s.disabled = false;
            });
            updateMath(); draw();
        }

        function showSolution() {
            const sc = state.scenario;
            let html = '';
            
            if (sc === 'incline') {
                const w = state.forces.mg||0, f = state.forces.f||0, F = state.forces.F||0, N = state.forces.N||0, a = state.incline.angle;
                const wx = (w*Math.sin(a*Math.PI/180)).toFixed(2), wy = (w*Math.cos(a*Math.PI/180)).toFixed(2);
                html = `
                <div class="mb-4 text-sm font-bold text-indigo-700">พิจารณาแนวตั้งฉากกับพื้นเอียง (แกน Y)</div>
                <div class="eq-grid mb-6">
                    <div>ΣF<sub>y</sub></div><div>=</div><div>ma<sub>y</sub></div>
                    <div>N - mg cos(θ)</div><div>=</div><div>0 (วัตถุไม่ลอย)</div>
                    <div>N</div><div>=</div><div>mg cos(${a}°)</div>
                    <div>N</div><div>=</div><div>${wy} N</div>
                </div>
                <div class="mb-4 text-sm font-bold text-indigo-700">พิจารณาแนวขนานกับพื้นเอียง (แกน X)</div>
                <div class="eq-grid">
                    <div>ΣF<sub>x</sub></div><div>=</div><div>ma<sub>x</sub></div>
                    <div>F - f - mg sin(θ)</div><div>=</div><div>ma<sub>x</sub></div>
                    <div>${F} - ${f} - ${wx}</div><div>=</div><div>(1) a<sub>x</sub></div>
                    <div>${(F - f - wx).toFixed(2)}</div><div>=</div><div>a<sub>x</sub></div>
                    <div>a<sub>x</sub></div><div>=</div><div>${(F - f - wx).toFixed(2)} m/s²</div>
                </div>`;
            } else if (sc === 'two_strings') {
                const W = state.forces.mg||0, t1 = state.forces.T1||0, t2 = state.forces.T2||0;
                const a1 = state.two_strings.th1, a2 = state.two_strings.th2;
                html = `
                <div class="mb-4 text-sm font-bold text-indigo-700">พิจารณาสมดุลกล (แกน X)</div>
                <div class="eq-grid mb-6">
                    <div>ΣF<sub>x</sub></div><div>=</div><div>0</div>
                    <div>T<sub>1</sub> cos(${a1}°) - T<sub>2</sub> cos(${a2}°)</div><div>=</div><div>0</div>
                    <div>T<sub>1</sub></div><div>=</div><div>T<sub>2</sub> [cos(${a2}°) / cos(${a1}°)] --- (1)</div>
                </div>
                <div class="mb-4 text-sm font-bold text-indigo-700">พิจารณาสมดุลกล (แกน Y)</div>
                <div class="eq-grid">
                    <div>ΣF<sub>y</sub></div><div>=</div><div>0</div>
                    <div>T<sub>1</sub> sin(${a1}°) + T<sub>2</sub> sin(${a2}°) - mg</div><div>=</div><div>0</div>
                    <div>(แทนค่า T1 จากสมการที่ 1)</div><div></div><div></div>
                    <div>T<sub>2</sub> [cos(${a2}°)/cos(${a1}°)] sin(${a1}°) + T<sub>2</sub> sin(${a2}°)</div><div>=</div><div>${W}</div>
                    <div>T<sub>2</sub> [${(Math.cos(a2*Math.PI/180)*Math.tan(a1*Math.PI/180) + Math.sin(a2*Math.PI/180)).toFixed(4)}]</div><div>=</div><div>${W}</div>
                    <div>T<sub>2</sub></div><div>=</div><div>${t2} N</div>
                    <div>ดังนั้น T<sub>1</sub></div><div>=</div><div>${t1} N</div>
                </div>`;
            } else if (sc === 'elevator') {
                const m = state.elevator.m, M = state.elevator.m_lift, a = state.elevator.a;
                const N = state.forces.N||0, T = state.forces.T||0;
                html = `
